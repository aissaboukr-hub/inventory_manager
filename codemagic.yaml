workflows:
  flutter-app-workflow:
    name: Inventory Manager CI/CD
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - keystore_credentials
        - apple_auth
    
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Setup Flutter & Dependencies
        script: |
          flutter pub get

      - name: Code Generation (Build Runner)
        script: |
          # Commande critique pour Clean Architecture (Models/DAO)
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android (Release)
        script: |
          flutter build appbundle --release --build-name=1.0.0 --build-number=$BUILD_NUMBER

      - name: Build iOS (Release)
        script: |
          # Si vous n'avez pas encore de certificats, utilisez --no-codesign pour tester le build
          flutter build ios --release --no-codesign

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/iphoneos/*.ipa
