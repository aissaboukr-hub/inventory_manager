name: inventory_manager
description: Application de gestion d'inventaire performante
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Database
  drift: ^2.14.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18
  
  # Scanner
  mobile_scanner: ^3.5.5
  
  # Excel (pour import ET export)
  excel: ^4.0.2
  
  # Utils
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  file_picker: ^8.0.7
  
  # Google Sheets
  googleapis: ^11.4.0
  googleapis_auth: ^1.4.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Audio
  audioplayers: ^5.2.1
  
  # UI
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # ← CORRIGÉ: intl ^0.20.2 (au lieu de ^0.18.1)
  intl: ^0.20.2
  
  # Navigation
  path: ^1.8.3

dependency_overrides:
  file_picker: ^8.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/beep.mp3
    - assets/sounds/error.mp3