name: inventory_manager
description: Application de gestion d'inventaire performante
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  
  # Database
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  
  # Scanner
  mobile_scanner: ^7.2.0
  
  # Excel
  syncfusion_flutter_xlsio: ^33.1.44
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  excel: ^4.0.2
  
  # Google Sheets
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  http: ^1.6.0
  
  # Audio
  audioplayers: ^6.6.0
  
  # UI
  flutter_slidable: ^4.0.3
  shimmer: ^3.0.0
  intl: ^0.20.2
  
  # Utils
  path: ^1.9.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/beep.mp3
    - assets/sounds/error.mp3